# =============================================================================
# iot23_split_plan_subsetA_v2.yaml — IoT-23 Subset A v2 candidate split plan
# =============================================================================
# Phase 0.6.2 — Coverage remediation round 1
# Designed: 2026-04-02
#
# KEY DIFFERENCES FROM v1 (iot23_split_plan.yaml):
#   - Added 3 new train scenarios: Capture-52-1 (Gagfyt), Capture-60-1 (Kenjiro/Gafgyt),
#     and Capture-44-1 (Mirai, optional)
#   - Val and test are UNCHANGED from v1
#   - Purpose: expand family coverage in train while preserving CIC→IoT cross-domain target test
#
# DESIGN PRINCIPLES (all inherited from v1):
#   - Scenario-level split: every flow from a scenario goes entirely to one partition
#   - New families added to train only (test unchanged)
#   - Test retains: Capture-8-1 (Torii), Capture-34-1 (Hajime), Honeypot-5-1 (benign)
# =============================================================================

subset: "A"
version: "v2_candidate"
design_date: "2026-04-02"
supersedes: "iot23_split_plan.yaml (Subset A v1)"

rationale: >
  Coverage remediation round 1 adds Gagfyt (52-1) and Kenjiro/Gafgyt (60-1) to the
  training split to address the family coverage gap identified in Phase 0.6 audit.
  Capture-44-1 (tiny Mirai) is also added as a low-cost additional train scenario.
  The test split is intentionally unchanged to preserve compatibility with existing
  CIC→IoT cross-domain results (CIC-trained models applied to unchanged IoT test set).

pcap_base_url: "https://mcfp.felk.cvut.cz/publicDatasets/IoT-23-Dataset/IndividualScenarios"

# ── TRAIN (v1 scenarios, unchanged) ──────────────────────────────────────────
scenarios:

  - scenario: "CTU-IoT-Malware-Capture-20-1"
    split: "train"
    family: "Mirai"
    label_type: "malware"
    version_added: "v1"
    pcap_url_relpath: "CTU-IoT-Malware-Capture-20-1/2018-10-02-13-12-30-192.168.100.103.pcap"
    pcap_filename: "2018-10-02-13-12-30-192.168.100.103.pcap"
    pcap_size_approx: "3.9 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-IoT-Malware-Capture-20-1/bro/conn.log.labeled"

  - scenario: "CTU-IoT-Malware-Capture-42-1"
