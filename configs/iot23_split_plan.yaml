# =============================================================================
# iot23_split_plan.yaml — IoT-23 Subset A scenario-level split plan
# =============================================================================
# Phase 4 Step 2 — designed 2026-03-25
#
# DESIGN PRINCIPLES
#   - Scenario-level split: every flow from a scenario goes entirely to one
#     partition, preventing temporal leakage across splits.
#   - Subset A: 8 small-to-medium scenarios; total PCAP ~376 MB.
#     Very large scenarios (label ref > 500 MB or confirmed PCAP > 500 MB)
#     are deferred.
#   - Attack-family composition: train+val both contain Mirai only; test
#     contains Torii + Hajime (non-Mirai) to probe cross-family generalisation.
#   - Each split includes at least one benign scenario.
# =============================================================================

subset: "A"
design_date: "2026-03-25"

rationale: >
  Disk constraint: 149 GB free on D:. PCAPs for the full 23-scenario IoT-23
  corpus would exceed available space. Subset A selects 8 scenarios whose
  confirmed PCAP sizes (checked against Stratosphere Lab server 2026-03-25)
  total approximately 376 MB decompressed. Scenarios with label refs > 500 MB
  are deferred as a proxy for large PCAPs (with the exception of Capture-44-1
  whose 30 KB label ref proved misleading — actual PCAP is 1.7 GB).
  The test set exclusively contains non-Mirai malware families (Torii, Hajime)
  and a large benign scenario, providing a meaningful cross-family evaluation.

# PCAP base URL — append pcap_url_relpath to form full download URL
pcap_base_url: "https://mcfp.felk.cvut.cz/publicDatasets/IoT-23-Dataset/IndividualScenarios"

# Paths below are relative to the iot23 external data root (D:/ids_project_data/iot23/)
scenarios:

  # ── TRAIN ─────────────────────────────────────────────────────────────────
  - scenario: "CTU-IoT-Malware-Capture-20-1"
    split: "train"
    family: "Mirai"
    label_type: "malware"
    pcap_url_relpath: "CTU-IoT-Malware-Capture-20-1/2018-10-02-13-12-30-192.168.100.103.pcap"
    pcap_filename: "2018-10-02-13-12-30-192.168.100.103.pcap"
    pcap_size_approx: "3.9 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-IoT-Malware-Capture-20-1/bro/conn.log.labeled"

  - scenario: "CTU-IoT-Malware-Capture-42-1"
    split: "train"
    family: "Mirai"
    label_type: "malware"
    pcap_url_relpath: "CTU-IoT-Malware-Capture-42-1/2019-01-10-14-34-38-192.168.1.197.pcap"
    pcap_filename: "2019-01-10-14-34-38-192.168.1.197.pcap"
    pcap_size_approx: "2.8 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-IoT-Malware-Capture-42-1/bro/conn.log.labeled"

  - scenario: "CTU-Honeypot-Capture-4-1"
    split: "train"
    family: "benign"
    label_type: "benign"
    # Server file is .pcap.xz; decompress to .pcap locally
    pcap_url_relpath: "CTU-Honeypot-Capture-4-1/2018-10-25-14-06-32-192.168.1.132.pcap.xz"
    pcap_filename: "2018-10-25-14-06-32-192.168.1.132.pcap"
    pcap_size_approx: "368 KB compressed"
    pcap_compressed: true
    pcap_compressed_ext: ".xz"
    label_ref_relpath: "labels/CTU-Honeypot-Capture-4-1/bro/conn.log.labeled"

  # ── VAL ───────────────────────────────────────────────────────────────────
  - scenario: "CTU-IoT-Malware-Capture-21-1"
    split: "val"
    family: "Mirai"
    label_type: "malware"
    pcap_url_relpath: "CTU-IoT-Malware-Capture-21-1/2018-10-03-15-22-32-192.168.100.113.pcap"
    pcap_filename: "2018-10-03-15-22-32-192.168.100.113.pcap"
    pcap_size_approx: "3.9 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-IoT-Malware-Capture-21-1/bro/conn.log.labeled"

  - scenario: "CTU-Honeypot-Capture-7-1"
    split: "val"
    family: "benign"
    label_type: "benign"
    # Somfy-01 sub-scenario; PCAP and label ref both under Somfy-01/ on server
    pcap_url_relpath: "CTU-Honeypot-Capture-7-1/Somfy-01/2019-07-03-15-15-47-first_start_somfy_gateway.pcap"
    pcap_filename: "2019-07-03-15-15-47-first_start_somfy_gateway.pcap"
    pcap_size_approx: "2.0 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-Honeypot-Capture-7-1/Somfy-01/bro/conn.log.labeled"
    notes: "Non-standard layout: Somfy-01 sub-scenario; only sub-scenario with labeled data."

  # ── TEST ──────────────────────────────────────────────────────────────────
  - scenario: "CTU-IoT-Malware-Capture-8-1"
    split: "test"
    family: "Torii"
    label_type: "malware"
    pcap_url_relpath: "CTU-IoT-Malware-Capture-8-1/2018-07-31-15-15-09-192.168.100.113.pcap"
    pcap_filename: "2018-07-31-15-15-09-192.168.100.113.pcap"
    pcap_size_approx: "2.0 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-IoT-Malware-Capture-8-1/bro/conn.log.labeled"

  - scenario: "CTU-IoT-Malware-Capture-34-1"
    split: "test"
    family: "Hajime"
    label_type: "malware"
    pcap_url_relpath: "CTU-IoT-Malware-Capture-34-1/2018-12-21-15-50-14-192.168.1.195.pcap"
    pcap_filename: "2018-12-21-15-50-14-192.168.1.195.pcap"
    pcap_size_approx: "120 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-IoT-Malware-Capture-34-1/bro/conn.log.labeled"
    notes: "Uses det_label field name instead of detailed-label (Zeek variant)."

  - scenario: "CTU-Honeypot-Capture-5-1"
    split: "test"
    family: "benign"
    label_type: "benign"
    pcap_url_relpath: "CTU-Honeypot-Capture-5-1/2018-09-21-capture.pcap"
    pcap_filename: "2018-09-21-capture.pcap"
    pcap_size_approx: "364 MB"
    pcap_compressed: false
    label_ref_relpath: "labels/CTU-Honeypot-Capture-5-1/bro/conn.log.labeled"

